<!-- Mouse-only convenience dismiss; the "dismiss" button below is the keyboard-accessible equivalent -->
<!-- eslint-disable-next-line @angular-eslint/template/click-events-have-key-events, @angular-eslint/template/interactive-supports-focus -->
<div class="feedback-backdrop" (click)="dismiss()"></div>
<aside class="feedback-panel">
  <h3>{{ 'feedback.title' | translate }}</h3>
  <p>{{ 'feedback.description' | translate }}</p>

  <button class="btn btn-primary" (click)="openMailto()">
    {{ 'feedback.sendEmail' | translate }}
  </button>

  @if (showFallback) {
    <div class="fallback">
      <p>{{ 'feedback.noMailClient' | translate }}</p>
      <pre class="email-template">{{ emailTemplate }}</pre>
      <button class="btn btn-secondary" (click)="copyTemplate()">
        {{ (copied ? 'feedback.copied' : 'feedback.copyTemplate') | translate }}
      </button>
    </div>
  }

  <button class="dismiss-btn" (click)="dismiss()">
    {{ 'feedback.dismiss' | translate }}
  </button>
</aside>
